# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Note: npm dependency remediation for /backend and /frontend is handled by
  # .github/workflows/dependency-remediation.yml to avoid duplicate PRs.
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "01:00"
      timezone: "UTC"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(ci)"

  # BEGIN_ANDROID_GRADLE_DEPENDABOT
  # Android Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/frontend/android"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "01:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "android"
    commit-message:
      prefix: "chore(android)"
      include: "scope"
  # END_ANDROID_GRADLE_DEPENDABOT
