name: Test Coverage

permissions:
  contents: read

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

concurrency:
  group: test-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-coverage:
    name: Frontend Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Pin npm version
        run: npm install -g npm@10.9.2

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --include=optional

      - name: Ensure Rollup native binary (CI)
        working-directory: frontend
        run: |
          if [ "$(uname -s)" = "Linux" ]; then
            npm i --no-save @rollup/rollup-linux-x64-gnu
          fi

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          directory: ./frontend/coverage
          flags: frontend
          name: frontend-coverage

  backend-coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_ENV: test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: shotspot_test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: shotspot_test_db
      DB_NAME_CORE_API: shotspot_test_db_core_api
      DB_NAME_GAME_LOGIC: shotspot_test_db_game_logic
      DB_MAX_CONNECTIONS: 5
      DB_IDLE_TIMEOUT_MS: 1000
      JWT_EXPIRES_IN: 1h
      PORT: 3999
      CORS_ORIGIN: http://localhost:3001
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      LOG_LEVEL: error
      LOG_FORMAT: dev
    services:
      postgres:
        image: postgres:14
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate ephemeral test secrets
        run: |
          echo "JWT_SECRET=$(openssl rand -hex 32)" >> $GITHUB_ENV
          echo "SESSION_SECRET=$(openssl rand -hex 24)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Pin npm version
        run: npm install -g npm@10.9.2

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --include=optional

      - name: Check migration consistency
        working-directory: backend
        run: npm run check-migrations

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            sleep 2
          done

      - name: Setup test database
        working-directory: backend
        run: npm run setup-test-db

      - name: Setup parallel test databases
        if: github.event_name != 'pull_request'
        working-directory: backend
        run: node scripts/setup-parallel-dbs.js

      - name: Run backend tests with coverage
        working-directory: backend
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run test:coverage
          else
            npm run test:parallel:coverage
          fi

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          directory: ./backend/coverage
          flags: backend
          name: backend-coverage
