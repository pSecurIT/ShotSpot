name: Dependency Remediation

on:
  schedule:
    - cron: '0 4 * * 5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependency-remediation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remediate:
    name: Generate Dependency Remediation PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Use Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.x

      - name: Pin npm version
        run: npm install -g npm@10.9.2

      - name: Apply backend lockfile remediation
        working-directory: backend
        run: |
          set -euo pipefail
          npx --yes npm-check-updates@latest --target patch --upgrade
          npm install --ignore-scripts
          npm install --package-lock-only --ignore-scripts
          npm audit fix --package-lock-only --ignore-scripts || true

      - name: Apply frontend lockfile remediation
        working-directory: frontend
        run: |
          set -euo pipefail
          npx --yes npm-check-updates@latest --target patch --upgrade
          npm install --ignore-scripts
          npm install --package-lock-only --ignore-scripts
          npm audit fix --package-lock-only --ignore-scripts || true

      - name: Create remediation pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          # Use a repository secret token when available so the created PR can trigger
          # downstream workflows instead of being suppressed as a GITHUB_TOKEN event.
          token: ${{ secrets.DEPENDENCY_REMEDIATION_TOKEN != '' && secrets.DEPENDENCY_REMEDIATION_TOKEN || github.token }}
          commit-message: "chore(security): automated dependency remediation"
          title: "chore(security): automated dependency remediation"
          body: |
            This PR was created automatically by CI to apply dependency remediation.

            Scope:
            - backend/package.json
            - backend/package-lock.json
            - frontend/package.json
            - frontend/package-lock.json

            Notes:
            - Includes safe patch-level dependency updates.
            - Includes npm audit fix lockfile remediation where applicable.
            - Auto-merge is intentionally disabled.
          labels: |
            security
            dependencies
            automated
          branch: chore/security-dependency-remediation
          delete-branch: true
          add-paths: |
            backend/package.json
            backend/package-lock.json
            frontend/package.json
            frontend/package-lock.json



