name: Mobile Release

permissions:
  contents: write

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - android
          - ios
          - both
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - internal
          - beta
          - production

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  # Build Android Release
  android-release:
    name: Android Release Build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' || 
      (github.event_name == 'workflow_dispatch' && 
       (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both'))
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets['ANDROID_KEYSTORE_BASE64'] }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets['ANDROID_KEYSTORE_PASSWORD'] }}
      ANDROID_KEY_ALIAS: ${{ secrets['ANDROID_KEY_ALIAS'] }}
      ANDROID_KEY_PASSWORD: ${{ secrets['ANDROID_KEY_PASSWORD'] }}
      VITE_API_URL_PRODUCTION: ${{ secrets['VITE_API_URL_PRODUCTION'] }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Pin npm version
        run: npm install -g npm@10.9.2

      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Decode Keystore
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            mkdir -p frontend/android/app
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > frontend/android/app/release.keystore
            echo "✅ Keystore decoded successfully"
          else
            echo "⚠️  Warning: ANDROID_KEYSTORE_BASE64 secret not set. Skipping keystore setup."
          fi

      - name: Create keystore.properties
        run: |
          if [ -n "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "storeFile=app/release.keystore" > frontend/android/keystore.properties
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}" >> frontend/android/keystore.properties
            echo "keyAlias=${ANDROID_KEY_ALIAS}" >> frontend/android/keystore.properties
            echo "keyPassword=${ANDROID_KEY_PASSWORD}" >> frontend/android/keystore.properties
            echo "✅ keystore.properties created"
          else
            echo "⚠️  Warning: Keystore secrets not set. Build may fail."
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build web app (production)
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.VITE_API_URL_PRODUCTION }}
        run: npm run build

      - name: Add Android platform
        working-directory: frontend
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Make Gradlew Executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Bump version code
        working-directory: frontend/android
        run: |
          # Extract version from package.json and increment build number
          VERSION_NAME=$(node -p "require('../package.json').version")
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          
          # Use GitHub run number as version code
          VERSION_CODE=${{ github.run_number }}
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          
          echo "Building version $VERSION_NAME ($VERSION_CODE)"

      - name: Build Android Release AAB
        working-directory: frontend/android
        run: ./gradlew bundleRelease --stacktrace

      - name: Build Android Release APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease --stacktrace

      # Disabled: Upload AAB to Google Play
      # Uncomment this step when you're ready to publish to Google Play
      # - name: Upload AAB to Google Play
      #   if: |
      #     success() && 
      #     github.event_name == 'release' || 
      #     github.event.inputs.release_type == 'production'
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
      #     packageName: com.psecurit.shotspot
      #     releaseFiles: frontend/android/app/build/outputs/bundle/release/app-release.aab
      #     track: ${{ github.event.inputs.release_type || 'internal' }}
      #     status: completed
      #     whatsNewDirectory: frontend/android/release-notes

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-release
          path: |
            frontend/android/app/build/outputs/bundle/release/app-release.aab
            frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: |
            frontend/android/app/build/outputs/apk/release/app-release.apk
            frontend/android/app/build/outputs/bundle/release/app-release.aab
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build iOS Release
  ios-release:
    name: iOS Release Build
    runs-on: macos-latest
    if: |
      github.event_name == 'release' || 
      (github.event_name == 'workflow_dispatch' && 
       (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both'))
    env:
      VITE_API_URL_PRODUCTION: ${{ secrets['VITE_API_URL_PRODUCTION'] }}
      IOS_CERTIFICATE_BASE64: ${{ secrets['IOS_CERTIFICATE_BASE64'] }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets['IOS_CERTIFICATE_PASSWORD'] }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets['IOS_PROVISIONING_PROFILE_BASE64'] }}
      IOS_TEAM_ID: ${{ secrets['IOS_TEAM_ID'] }}
      IOS_PROVISIONING_PROFILE_NAME: ${{ secrets['IOS_PROVISIONING_PROFILE_NAME'] }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets['APP_STORE_CONNECT_API_KEY_ID'] }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets['APP_STORE_CONNECT_ISSUER_ID'] }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets['APP_STORE_CONNECT_API_KEY_BASE64'] }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Detect signing secrets
        id: detect_signing
        run: |
          required=(
            IOS_CERTIFICATE_BASE64
            IOS_CERTIFICATE_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64
            IOS_TEAM_ID
            IOS_PROVISIONING_PROFILE_NAME
          )

          missing=()
          present=0

          for var_name in "${required[@]}"; do
            if [ -n "${!var_name}" ]; then
              present=$((present + 1))
            else
              missing+=("$var_name")
            fi
          done

          # Fully configured: use signed archive flow.
          if [ ${#missing[@]} -eq 0 ]; then
            echo "signing_required=true" >> $GITHUB_ENV
            echo "signing_required=true" >> $GITHUB_OUTPUT
            echo "✅ Signing secrets detected - will perform signed archive"
          # Not configured at all: use simulator fallback flow.
          elif [ $present -eq 0 ]; then
            echo "signing_required=false" >> $GITHUB_ENV
            echo "signing_required=false" >> $GITHUB_OUTPUT
            echo "⚠️  Signing secrets not configured - will perform simulator build"
          # Partially configured: fail fast with actionable diagnostics.
          else
            echo "::error::Partial iOS signing configuration detected. Missing required secret(s): ${missing[*]}"
            echo "Provide all required secrets for signed builds, or remove all iOS signing secrets to use simulator fallback."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Pin npm version
        run: npm install -g npm@10.9.2

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: 'latest-stable'

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install Apple Certificate
        if: ${{ steps.detect_signing.outputs.signing_required == 'true' }}
        run: |
          set -e
          echo "Importing certificate into temporary keychain"
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          echo "✅ Certificate imported successfully"

      - name: Install Provisioning Profile
        if: ${{ steps.detect_signing.outputs.signing_required == 'true' }}
        run: |
          set -e
          echo "Installing provisioning profile"
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH/profile.mobileprovision"
          echo "✅ Provisioning profile installed"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build web app (production)
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.VITE_API_URL_PRODUCTION }}
        run: npm run build

      - name: Ensure iOS platform exists
        working-directory: frontend
        run: |
          set -e

          if [ ! -f ios/App/Podfile ] || [ ! -f ios/App/App.xcodeproj/project.pbxproj ]; then
            echo "iOS platform is missing or incomplete; recreating it"
            rm -rf ios
            npx cap add ios
          else
            echo "iOS platform already present"
          fi

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync ios

      - name: Inspect generated iOS project
        working-directory: frontend
        run: |
          echo "iOS directory structure:"
          find ios -maxdepth 4 | sort

      - name: Install iOS dependencies
        working-directory: frontend/ios/App
        run: pod install

      - name: Verify expected iOS app layout
        working-directory: frontend
        run: |
          set -e

          if [ ! -d ios/App ]; then
            echo "❌ Expected ios/App directory was not generated"
            echo "Current iOS structure:"
            find ios -maxdepth 4 | sort || true
            exit 1
          fi

          if [ ! -f ios/App/App.xcworkspace/contents.xcworkspacedata ]; then
            echo "❌ Missing ios/App/App.xcworkspace"
            find ios/App -maxdepth 3 | sort || true
            exit 1
          fi

          if [ ! -f ios/App/App/Info.plist ]; then
            echo "❌ Missing ios/App/App/Info.plist"
            find ios/App -maxdepth 4 | sort || true
            exit 1
          fi

          echo "✅ Verified expected iOS layout at ios/App"

      - name: Bump version
        working-directory: frontend/ios/App
        run: |
          VERSION_NAME=$(node -p "require('../../package.json').version")
          BUILD_NUMBER=${{ github.run_number }}
          
          # Update Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION_NAME" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" App/Info.plist
          
          echo "Building version $VERSION_NAME ($BUILD_NUMBER)"

      - name: Build and Archive iOS app (signed)
        if: ${{ steps.detect_signing.outputs.signing_required == 'true' }}
        working-directory: frontend/ios/App
        run: |
          set -e
          echo "Running signed archive"
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/App.xcarchive \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=$IOS_TEAM_ID \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_NAME"

      - name: Build for iOS Simulator (unsigned)
        if: ${{ steps.detect_signing.outputs.signing_required == 'false' }}
        working-directory: frontend/ios/App
        run: |
          set -e
          echo "No signing credentials detected - building for iOS Simulator (unsigned)"
          mkdir -p build
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath $PWD/build/DerivedData \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Export IPA
        if: ${{ steps.detect_signing.outputs.signing_required == 'true' }}
        working-directory: frontend/ios/App
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$IOS_TEAM_ID</string>
            <key>uploadSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to App Store Connect
        if: |
          success() && 
          steps.detect_signing.outputs.signing_required == 'true' &&
          (github.event_name == 'release' || 
          github.event.inputs.release_type == 'production')
        run: |
          # Create API key file
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          
          # Upload IPA to App Store Connect using altool API key auth
          xcrun altool --upload-app \
            --type ios \
            --file frontend/ios/App/build/App.ipa \
            --apiKey $APP_STORE_CONNECT_API_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID

      - name: Upload Release Artifacts (signed)
        if: ${{ steps.detect_signing.outputs.signing_required == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ios-release
          path: |
            frontend/ios/App/build/App.ipa
            frontend/ios/App/build/App.xcarchive
          retention-days: 30

      - name: Upload Build Artifacts (unsigned)
        if: ${{ steps.detect_signing.outputs.signing_required == 'false' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ios-simulator-build
          path: frontend/ios/App/build/DerivedData
          retention-days: 30

      - name: Create GitHub Release Asset
        if: ${{ steps.detect_signing.outputs.signing_required == 'true' && github.event_name == 'release' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: frontend/ios/App/build/App.ipa
          token: ${{ secrets.GITHUB_TOKEN }}

  # Notify on completion
  notify-release:
    name: Notify Release Status
    runs-on: ubuntu-latest
    needs: [android-release, ios-release]
    if: always()
    
    steps:
      - name: Release Summary
        run: |
          echo "## 📱 Mobile Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Android**: ${{ needs.android-release.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **iOS**: ${{ needs.ios-release.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          ANDROID_RESULT="${{ needs.android-release.result }}"
          IOS_RESULT="${{ needs.ios-release.result }}"
          
          # Check if any job ran
          if [ "$ANDROID_RESULT" = "skipped" ] && [ "$IOS_RESULT" = "skipped" ]; then
            echo "ℹ️  **No releases were triggered.**" >> $GITHUB_STEP_SUMMARY
          # Check if all ran jobs succeeded
          elif ([ "$ANDROID_RESULT" = "success" ] || [ "$ANDROID_RESULT" = "skipped" ]) && \
               ([ "$IOS_RESULT" = "success" ] || [ "$IOS_RESULT" = "skipped" ]) && \
               ([ "$ANDROID_RESULT" = "success" ] || [ "$IOS_RESULT" = "success" ]); then
            echo "✅ **All releases completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  **Some releases failed. Check logs above.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
