name: Docker Build and Test

on:
  # Keep push scoped to docker/app changes for faster, cheaper CI.
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/docker.yml'
  # Always run on PRs to ensure required checks are reported.
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '15 3 * * 1'
  workflow_dispatch:

concurrency:
  group: docker-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-gate:
    name: Docker Change Gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.scope.outputs.should_run }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Determine whether Docker validation should run
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          should_run=true

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"

            changed_files="$(
              git diff --name-only "$base_sha" "$head_sha" -- \
                'Dockerfile' \
                'docker-compose.yml' \
                'backend/**' \
                'frontend/**' \
                '.github/workflows/docker.yml' 2>/dev/null
            )" || changed_files=""

            if [ -n "$changed_files" ]; then
              should_run=true
              echo "Docker-relevant changes detected for this pull request." >> "$GITHUB_STEP_SUMMARY"
            elif git diff --quiet "$base_sha" "$head_sha" -- >/dev/null 2>&1; then
              should_run=false
              echo "No Docker-relevant changes detected for this pull request; heavy Docker validation will be skipped." >> "$GITHUB_STEP_SUMMARY"
            else
              should_run=true
              echo "Unable to compute the pull request diff with local SHAs; Docker validation will run by default." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "Non-pull_request event; Docker validation will run." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

  test-docker-build:
    name: Test Docker Build
    needs: docker-gate
    if: ${{ needs.docker-gate.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - name: Pin npm version
        run: npm install -g npm@10.9.2

      - name: Verify package-lock.json is up to date (backend)
        run: |
          cd backend
          npm --version
          npm install --package-lock-only --include=optional --ignore-scripts
          if ! git diff --quiet package-lock.json; then
            echo "❌ backend/package-lock.json is out of sync with package.json" >&2
            echo "Run 'cd backend && npm install --include=optional' and commit the updated package-lock.json" >&2
            git --no-pager diff -- package-lock.json
            exit 1
          fi
          echo "✅ backend/package-lock.json is in sync"

      - name: Verify package-lock.json is up to date (frontend)
        run: |
          cd frontend
          npm --version
          npm install --package-lock-only --include=optional --ignore-scripts
          if ! git diff --quiet package-lock.json; then
            echo "❌ frontend/package-lock.json is out of sync with package.json" >&2
            echo "Run 'cd frontend && npm install --include=optional' and commit the updated package-lock.json" >&2
            git --no-pager diff -- package-lock.json
            exit 1
          fi
          echo "✅ frontend/package-lock.json is in sync"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04

      - name: Resolve Snyk reporting settings
        shell: bash
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: |
          snyk_org="$(node -e "const v = JSON.parse(process.env.VARS_JSON || '{}'); process.stdout.write(v.SNYK_ORG || '')")"
          if [ -n "$snyk_org" ]; then
            echo "SNYK_ORG_FLAG=--org=$snyk_org" >> "$GITHUB_ENV"
          else
            echo "SNYK_ORG_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        id: docker_build
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Snyk scan on Docker image + SARIF
        id: snyk_docker_test
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ steps.meta.outputs.tags }}
          args: --severity-threshold=high --sarif-file-output=snyk-docker.sarif
        continue-on-error: true

      - name: Upload Docker SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba
        if: ${{ always() && hashFiles('snyk-docker.sarif') != '' }}
        with:
          sarif_file: snyk-docker.sarif
          category: snyk-docker

      - name: Monitor Docker image in Snyk
        id: snyk_docker_monitor
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        continue-on-error: true
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk container monitor "${{ steps.meta.outputs.tags }}" \
            --file=Dockerfile \
            --project-name=shotspot-container \
            --target-reference=${GITHUB_REF_NAME} \
            --project-environment=hosted \
            --project-lifecycle=production \
            $SNYK_ORG_FLAG

      - name: Create .env.docker for CI
        run: |
          # Generate ephemeral secrets for this CI run
          JWT_SECRET=$(openssl rand -hex 32)
          DB_PASSWORD=$(openssl rand -hex 16)
          
          # Validate JWT_SECRET length (must be >= 32 chars)
          if [ ${#JWT_SECRET} -lt 32 ]; then
            echo "❌ Generated JWT_SECRET is too short (${#JWT_SECRET} chars, minimum 32 required)"
            exit 1
          fi
          
          echo "✅ Generated JWT_SECRET with ${#JWT_SECRET} characters"
          
          # Create Docker environment file (matches .env.docker.example)
          printf '%s\n' \
            'NODE_ENV=production' \
            'PORT=3001' \
            'DB_HOST=db' \
            'DB_PORT=5432' \
            'DB_NAME=shotspot_test' \
            'DB_USER=shotspot_test' \
            "DB_PASSWORD=${DB_PASSWORD}" \
            "JWT_SECRET=${JWT_SECRET}" \
            'SESSION_SECURE=false' \
            'SESSION_SAME_SITE=lax' \
            'CORS_ORIGIN=http://localhost:3001' \
            'RATE_LIMIT_WINDOW_MS=900000' \
            'RATE_LIMIT_MAX=100' \
            'LOG_LEVEL=info' \
            'VITE_API_URL=/api' \
            > .env.docker
          
          # Verify .env.docker content (diagnostic - redact secret)
          echo "=== .env.docker content (JWT_SECRET redacted) ==="
          grep -v "JWT_SECRET" .env.docker
          echo "JWT_SECRET=<redacted ${#JWT_SECRET} chars>"

      - name: Test Docker image
        run: |
          # Start services with Docker environment
          docker-compose --env-file .env.docker up -d

          # Check for immediate restarts (diagnostic)
          sleep 10
          if docker-compose --env-file .env.docker ps | grep -q "Restarting"; then
            echo "⚠️ Container is restarting - dumping logs for diagnosis..."
            docker-compose --env-file .env.docker logs app --tail=200
          fi

          # Wait for services to be healthy (increased timeout for DB init + migrations)
          echo "Waiting for services to be healthy..."
          timeout 300 bash -c '
            # Re-export variables in the subshell
            set -o allexport
            source .env.docker
            set +o allexport
            
            until docker-compose --env-file .env.docker ps | grep -q "healthy"; do
              echo "$(date) - Waiting for healthy containers..."
              docker-compose --env-file .env.docker ps
              
              # Check for restart loop during wait
              if docker-compose --env-file .env.docker ps | grep -q "Restarting"; then
                echo "⚠️ Container restarting detected - showing recent logs..."
                docker-compose --env-file .env.docker logs app --tail=50
              fi
              
              sleep 5
            done
          ' || {
            echo "❌ Services failed to become healthy after 5 minutes"
            echo "==== docker-compose ps ===="
            docker-compose --env-file .env.docker ps
            echo "==== docker-compose logs (app) - last 200 lines ===="
            docker-compose --env-file .env.docker logs app --tail=200 || true
            echo "==== docker-compose logs (db) - last 100 lines ===="
            docker-compose --env-file .env.docker logs db --tail=100 || true
            exit 1
          }

          # Test health endpoint
          echo "Testing health endpoint..."
          curl -f http://localhost:3001/api/health || {
            echo "Health check failed"
            docker-compose --env-file .env.docker logs app
            exit 1
          }

          # Test database connection
          echo "Testing database connection..."
          docker-compose --env-file .env.docker exec -T db psql -U shotspot_test -d shotspot_test -c "SELECT 1;" || {
            echo "Database connection failed"
            docker-compose --env-file .env.docker logs db
            exit 1
          }

          echo "✅ All Docker tests passed!"

      - name: Cleanup
        if: always()
        run: |
          # Guard docker-compose calls for robust cleanup
          # Only cleanup if .env.docker exists (meaning we got past setup)
          if [ -f .env.docker ]; then
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose --env-file .env.docker down -v 2>/dev/null || true
            elif docker compose version >/dev/null 2>&1; then
              docker compose --env-file .env.docker down -v 2>/dev/null || true
            fi
            rm -f .env.docker || true
          fi

      - name: Fail on blocking Snyk findings
        if: ${{ steps.snyk_docker_test.outcome == 'failure' || steps.snyk_docker_monitor.outcome == 'failure' }}
        run: |
          echo "::error::Snyk detected blocking Docker findings or failed to publish the monitoring snapshot."
          exit 1

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate image size report
        if: github.event_name != 'pull_request'
        run: |
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" | grep shotspot || true
          echo "## 📦 Image Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          docker images --format "{{.Repository}}:{{.Tag}} - {{.Size}}" | grep shotspot | head -1 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  test-docker-compose:
    name: Test Docker Compose
    needs: docker-gate
    if: ${{ needs.docker-gate.outputs.should_run == 'true' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Create .env.docker for CI
        run: |
          # Generate ephemeral secrets for this CI run
          JWT_SECRET=$(openssl rand -hex 32)
          DB_PASSWORD=$(openssl rand -hex 16)
          
          # Validate JWT_SECRET length (must be >= 32 chars)
          if [ ${#JWT_SECRET} -lt 32 ]; then
            echo "❌ Generated JWT_SECRET is too short (${#JWT_SECRET} chars, minimum 32 required)"
            exit 1
          fi
          
          echo "✅ Generated JWT_SECRET with ${#JWT_SECRET} characters"
          
          # Create Docker environment file (matches .env.docker.example)
          printf '%s\n' \
            'NODE_ENV=production' \
            'PORT=3001' \
            'DB_HOST=db' \
            'DB_PORT=5432' \
            'DB_NAME=shotspot_test' \
            'DB_USER=shotspot_test' \
            "DB_PASSWORD=${DB_PASSWORD}" \
            "JWT_SECRET=${JWT_SECRET}" \
            'SESSION_SECURE=false' \
            'SESSION_SAME_SITE=lax' \
            'CORS_ORIGIN=http://localhost:3001' \
            'RATE_LIMIT_WINDOW_MS=900000' \
            'RATE_LIMIT_MAX=100' \
            'LOG_LEVEL=info' \
            'VITE_API_URL=/api' \
            > .env.docker
          
          # Verify .env.docker content (diagnostic - redact secret)
          echo "=== .env.docker content (JWT_SECRET redacted) ==="
          grep -v "JWT_SECRET" .env.docker
          echo "JWT_SECRET=<redacted ${#JWT_SECRET} chars>"

          # Export variables so docker-compose sees them during interpolation
          set -o allexport
          source .env.docker
          set +o allexport

      - name: Validate docker-compose.yml
        run: docker-compose --env-file .env.docker config

      - name: Start Docker Compose services
        run: docker-compose --env-file .env.docker up -d

      - name: Check for immediate container issues
        run: |
          sleep 10
          if docker-compose --env-file .env.docker ps | grep -q "Restarting"; then
            echo "⚠️ Container is restarting - dumping logs for diagnosis..."
            docker-compose --env-file .env.docker logs app --tail=200
          fi

      - name: Wait for services
        run: |
          # Source env file for this step
          set -o allexport
          source .env.docker
          set +o allexport
          
          echo "Waiting for services to be ready..."
          timeout 300 bash -c '
            # Re-export variables in the subshell
            set -o allexport
            source .env.docker
            set +o allexport
            
            until [ "$(docker inspect -f {{.State.Health.Status}} shotspot-app 2>/dev/null)" == "healthy" ]; do
              echo "$(date) - Waiting for healthy app container..."
              docker-compose --env-file .env.docker ps
              
              # Check for restart loop during wait
              if docker-compose --env-file .env.docker ps | grep -q "Restarting"; then
                echo "⚠️ Container restarting detected - showing recent logs..."
                docker-compose --env-file .env.docker logs app --tail=50
              fi
              
              sleep 5
            done
          ' || {
            echo "❌ Application failed to become healthy after 5 minutes"
            echo "==== docker-compose ps ===="
            docker-compose --env-file .env.docker ps
            echo "==== docker-compose logs (app) - last 200 lines ===="
            docker-compose --env-file .env.docker logs app --tail=200 || true
            echo "==== docker-compose logs (db) - last 100 lines ===="
            docker-compose --env-file .env.docker logs db --tail=100 || true
            exit 1
          }

      - name: Test application endpoints
        run: |
          # Test health endpoint
          curl -f http://localhost:3001/api/health || exit 1

          # Verify auth endpoint is reachable without requiring OPTIONS success.
          status=$(curl -s -o /dev/null -w "%{http_code}" -X OPTIONS http://localhost:3001/api/auth/login)
          case "$status" in
            200|204|401|403|404|405)
              echo "Auth endpoint reachable, returned HTTP $status"
              ;;
            *)
              echo "Unexpected status from /api/auth/login: HTTP $status"
              exit 1
              ;;
          esac

      - name: Check logs for errors
        run: |
          docker-compose --env-file .env.docker logs | grep -i error && {
            echo "Errors found in logs"
            exit 1
          } || echo "No errors in logs"

      - name: Cleanup
        if: always()
        run: |
          # Guard docker-compose calls for robust cleanup
          # Only cleanup if .env.docker exists (meaning we got past setup)
          if [ -f .env.docker ]; then
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose --env-file .env.docker down -v 2>/dev/null || true
            elif docker compose version >/dev/null 2>&1; then
              docker compose --env-file .env.docker down -v 2>/dev/null || true
            fi
            rm -f .env.docker || true
          fi


