name: Mobile CI

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  ios:
    name: iOS Build
    runs-on: macos-latest

    defaults:
      run:
        shell: bash

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # -------------------------
      # Node.js setup
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Pin npm version
        run: npm install -g npm@10.9.2

      # -------------------------
      # Xcode setup
      # -------------------------
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: latest-stable

      - name: Verify runner architecture
        run: uname -m

      # -------------------------
      # Frontend build
      # -------------------------
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # -------------------------
      # Capacitor iOS sync
      # -------------------------
      - name: Sync Capacitor iOS
        working-directory: frontend
        run: |
          if [ -d ios ]; then
            npx cap sync ios
          else
            npx cap add ios
          fi

      # -------------------------
      # Validate SPM setup
      # -------------------------
      - name: Verify SPM project structure
        working-directory: frontend/ios/App
        run: |
          if [ ! -f App.xcodeproj/project.pbxproj ]; then
            echo "::error::App.xcodeproj not found"
            exit 1
          fi
          if [ ! -d CapApp-SPM ]; then
            echo "::error::SPM directory (CapApp-SPM) not found"
            exit 1
          fi
          echo "::notice::SPM setup verified"

      # -------------------------
      # Cache Xcode DerivedData
      # -------------------------
      - name: Cache Xcode DerivedData
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('frontend/ios/App/**/*.swift', 'frontend/ios/App/Package.resolved') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      # -------------------------
      # Resolve Swift packages
      # -------------------------
      - name: Resolve Swift Package dependencies
        working-directory: frontend/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -resolvePackageDependencies

      # -------------------------
      # Xcode validation build
      # -------------------------
      - name: Xcode build (validation)
        working-directory: frontend/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO

      # -------------------------
      # SwiftLint results (optional)
      # -------------------------
      - name: Upload SwiftLint results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ios-swiftlint-results
          path: frontend/ios/swiftlint-results.json
          if-no-files-found: warn
          retention-days: 7


