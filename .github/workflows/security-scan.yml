name: Security Scan

# Run security scans on PRs, pushes to main, and weekly to catch regressions
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    # Run weekly on Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  scan-vulnerabilities:
    name: Scan for Vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Build image for scanning
        shell: bash
        run: |
          set -euo pipefail
          echo "Building local image for vulnerability scan"
          docker build -t local/shotspot:scan-${{ github.sha }} .

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: local/shotspot:scan-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        if: ${{ hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'security-scan/trivy-container'

      - name: Fail on critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: local/shotspot:scan-${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy image summary
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: local/shotspot:scan-${{ github.sha }}
          format: 'github'
          output: '$GITHUB_STEP_SUMMARY'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          exit-code: '0'

  scan-filesystem:
    name: Scan Filesystem
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Run Trivy filesystem scanner (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy filesystem results
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        if: ${{ hashFiles('trivy-fs-results.sarif') != '' }}
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'security-scan/trivy-filesystem'

      - name: Fail on critical dependency vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy filesystem summary
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'github'
          output: '$GITHUB_STEP_SUMMARY'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          exit-code: '0'

  scan-secrets:
    name: Scan for Secrets (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          # Full history so gitleaks can scan all commits on the branch/PR
          fetch-depth: 0

      - name: Run Gitleaks (SARIF output)
        id: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Upload Gitleaks results to GitHub Security
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        if: ${{ hashFiles('results.sarif') != '' }}
        with:
          sarif_file: results.sarif
          category: security-scan/gitleaks-secret

      - name: Fail if secrets were detected
        if: ${{ steps.gitleaks.outcome == 'failure' }}
        run: |
          echo "::error::Gitleaks detected secrets. See the Security tab for details."
          exit 1


