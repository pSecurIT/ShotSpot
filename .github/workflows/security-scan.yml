name: Security Scan

# Run security scans on PRs, pushes to main, and weekly to catch regressions
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    # Run weekly on Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  scan-vulnerabilities:
    name: Scan for Vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image for scanning
        shell: bash
        run: |
          set -euo pipefail
          echo "Building local image for vulnerability scan"
          docker build -t local/shotspot:scan-${{ github.sha }} .

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/shotspot:scan-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          # Keep category compatible with historical baseline config from docker.yml
          # so PR code scanning can compare against main without "configuration not found".
          category: '.github/workflows/docker.yml:scan-vulnerabilities'

      - name: Upload Trivy results with legacy container category
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          # Backward-compatible category retained for old code-scanning baselines.
          category: 'trivy-container-scan'

      - name: Fail on critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/shotspot:scan-${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          exit-code: '1'

  scan-filesystem:
    name: Scan Filesystem
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy filesystem results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem-scan'

      - name: Fail on critical dependency vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          exit-code: '1'
