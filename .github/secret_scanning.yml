# GitHub Secret Scanning Configuration
# https://docs.github.com/en/code-security/secret-scanning/configuring-secret-scanning-for-your-repositories
#
# This file configures which paths are EXCLUDED from secret scanning alerts and push protection.
# All other paths are scanned automatically once Secret Scanning and Push Protection are
# enabled in repository Settings → Security → Secret scanning.
#
# Custom patterns (TWIZZIT_ENCRYPTION_KEY, JWT_SECRET, etc.) require GitHub Secret Protection
# (GitHub Team or Enterprise plan). They are NOT available for personal/public repositories.
#
# Project-specific patterns are enforced instead via Gitleaks in CI:
#   .gitleaks.toml        — pattern definitions
#   .github/workflows/security-scan.yml — scan-secrets job runs on every PR/push

paths-ignore:
  # Example / template env files — contain placeholder values only, never real secrets
  - "**/.env.example"
  - "**/.env.docker.example"
  - "**/.env.*.example"

  # Test fixtures and mocks — may contain intentionally fake credentials
  - "backend/test/**"
  - "frontend/cypress/fixtures/**"
  - "frontend/cypress/support/**"

  # Documentation — may reference secret formats for illustration
  - "**/*.md"
  - "docs/**"

  # Build / coverage output — not source
  - "backend/coverage/**"
  - "frontend/coverage/**"
  - "frontend/dist/**"
  - "frontend/android/**"
  - "frontend/ios/**"
